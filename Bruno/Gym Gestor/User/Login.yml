info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{apiUrl}}/api/auth/login"
  params:
    - name: ""
      value: ""
      type: query
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
