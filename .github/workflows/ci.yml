name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gym_gestor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d gym_gestor_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      PG_CONNECTION: pg
      PG_HOST: 127.0.0.1
      PG_PORT=5432
      PG_USER=postgres
      PG_PASSWORD=postgres
      PG_DB_NAME=gym_gestor

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: node ace migration:run --force
      - run: pnpm test
